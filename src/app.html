<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DataEditorY</title>
    <script>
      (function() {
        var _fetch = window.fetch;
        var SAME_ORIGIN_FETCH_TIMEOUT_MS = 10000;
        window.fetch = function(url, opts) {
          var isSameOrigin = typeof url === 'string'
            && (url.indexOf(location.origin) === 0 || url.indexOf('/') === 0);
          if (!isSameOrigin) return _fetch(url, opts);
          var ctrl, tid;
          try { ctrl = new AbortController(); } catch (_) { return _fetch(url, opts); }
          tid = setTimeout(function() { ctrl.abort(); }, SAME_ORIGIN_FETCH_TIMEOUT_MS);
          var merged = Object.assign({}, opts || {}, { signal: ctrl.signal });
          if (opts && opts.signal) {
            opts.signal.addEventListener('abort', function() { clearTimeout(tid); });
          }
          return _fetch(url, merged).finally(function() { clearTimeout(tid); });
        };
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
