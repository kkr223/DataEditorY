name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - ubuntu-22.04
          - macos-latest
        variant:
          - base
          - extra

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Apply Tauri config for variant
        run: node scripts/write-tauri-config.mjs ${{ matrix.variant }} src-tauri/tauri.conf.json

      - name: Build Tauri app and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_VARIANT: ${{ matrix.variant }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DataEditorY ${{ github.ref_name }}
          releaseBody: |
            Automated release for ${{ github.ref_name }}.

            Built from GitHub Actions using Tauri 2.
          releaseDraft: true
          prerelease: false

      - name: Pack Windows portable bundle
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $variantLabel = if ("${{ matrix.variant }}" -eq "base") { "Base" } else { "Extra" }
          $portableDir = "src-tauri/target/release/DataEditorY-$($variantLabel)-windows-portable"
          $resourceDir = "src-tauri/target/release/resources"
          $portableResourceDir = "$portableDir/resources"
          $zipPath = "src-tauri/target/release/DataEditorY-$($variantLabel)-windows-portable.zip"
          $sourceResourceDir = "static/resources"

          Remove-Item $portableDir -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $zipPath -Force -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Path $portableDir | Out-Null

          $candidates = @(
            "src-tauri/target/release/DataEditorY $($variantLabel).exe",
            "src-tauri/target/release/DataEditorY.exe",
            "src-tauri/target/release/dataeditory.exe"
          )
          $foundExe = $null
          foreach ($cand in $candidates) {
            if (Test-Path $cand) {
              $foundExe = $cand
              break
            }
          }
          if (-not $foundExe) {
            throw "Could not find compiled executable in target/release"
          }
          Copy-Item $foundExe -Destination "$portableDir/DataEditorY-$($variantLabel).exe"

          if (Test-Path $resourceDir) {
            Copy-Item $resourceDir -Destination $portableResourceDir -Recurse
          } else {
            throw "Expected Tauri resources directory not found: $resourceDir"
          }

          $requiredResources = @(
            @{ RelativePath = "strings"; SourcePath = "$sourceResourceDir/strings" },
            @{ RelativePath = "cover.jpg"; SourcePath = "$sourceResourceDir/cover.jpg" }
          )

          if ("${{ matrix.variant }}" -eq "extra") {
            $requiredResources += @{ RelativePath = "yugioh-card"; SourcePath = "$sourceResourceDir/yugioh-card" }
          }

          foreach ($resource in $requiredResources) {
            $targetPath = Join-Path $portableResourceDir $resource.RelativePath
            if (Test-Path $targetPath) {
              continue
            }

            if (-not (Test-Path $resource.SourcePath)) {
              throw "Missing required portable resource: $($resource.RelativePath)"
            }

            Copy-Item $resource.SourcePath -Destination $targetPath -Recurse
          }

          Compress-Archive -Path "$portableDir/*" -DestinationPath $zipPath -Force

      - name: Upload Windows portable bundle
        if: matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $variantLabel = if ("${{ matrix.variant }}" -eq "base") { "Base" } else { "Extra" }
          gh release upload ${{ github.ref_name }} "src-tauri/target/release/DataEditorY-$($variantLabel)-windows-portable.zip" --clobber
